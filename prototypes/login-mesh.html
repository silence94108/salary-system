<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>抢单平台 · 登录 · Mesh 渐变方案</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #FFFFFF;
    --bg-soft:      #F7F7FA;
    --bg-page:      #FAFAFD;
    --bg-hover:     #F2F2F7;

    --fg:           #1A1F36;
    --fg-2:         #3C4257;
    --fg-3:         #54575F;
    --fg-4:         #8C8F96;

    --border:       #E5E7EB;
    --border-soft:  #EBEBF1;
    --border-strong:#D8DAE5;

    --accent:       #635BFF;
    --accent-hover: #5851EE;
    --accent-deep:  #4842D2;
    --accent-bg:    #F1F0FE;
    --accent-bg-2:  #E5E3FE;
    --accent-fg:    #4F46E5;

    --pink:         #EC4899;
    --success:      #00A36F;

    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI',
                 'PingFang SC', 'Microsoft YaHei', sans-serif;

    --r-md: 6px;
    --r-lg: 8px;
    --r-xl: 12px;
    --r-2xl: 16px;

    --shadow-1: 0 1px 1px rgba(0,0,0,.03), 0 1px 2px rgba(0,0,0,.04);
    --shadow-3: 0 4px 12px rgba(0,0,0,.04), 0 24px 60px rgba(99,91,255,.10);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--fg);
    background: var(--bg-page);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'cv02','cv03','cv11','ss01';

    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }
  a { color: inherit; text-decoration: none; }

  /* ============ 背景：dotted grid + mesh blobs + noise + 几何浮元素 ============ */
  /* 网格底纹 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(99,91,255,.18) 1px, transparent 1px);
    background-size: 24px 24px;
    opacity: 0.55;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
  }

  /* 大字品牌水印 */
  .bg-watermark {
    position: fixed;
    z-index: 0;
    pointer-events: none;
    user-select: none;
    font-size: 24vw;
    font-weight: 800;
    letter-spacing: -.06em;
    line-height: 0.85;
    color: transparent;
    -webkit-text-stroke: 1.5px rgba(99,91,255,.14);
    top: -3vw;
    left: -2vw;
  }
  .bg-watermark-2 {
    position: fixed;
    z-index: 0;
    pointer-events: none;
    user-select: none;
    font-size: 14vw;
    font-weight: 800;
    letter-spacing: -.05em;
    line-height: 0.85;
    color: transparent;
    -webkit-text-stroke: 1px rgba(236,72,153,.10);
    bottom: -2vw;
    right: -1vw;
    transform: rotate(-3deg);
  }

  /* 斜向光带 */
  .bg-streak {
    position: fixed;
    z-index: 0;
    pointer-events: none;
    width: 120vw;
    height: 200px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255,255,255,.5) 30%,
      rgba(255,255,255,.7) 50%,
      rgba(255,255,255,.5) 70%,
      transparent 100%);
    transform: rotate(-12deg);
    filter: blur(40px);
    opacity: 0.5;
  }
  .streak-1 { top: 18%; left: -20vw; }
  .streak-2 {
    top: 65%; left: -10vw;
    height: 140px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(236,72,153,.35) 50%,
      transparent 100%);
    transform: rotate(8deg);
    opacity: 0.55;
  }

  /* mesh blob 装饰（多层多色） */
  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 {
    width: 520px; height: 520px;
    background: radial-gradient(circle, #635BFF 0%, transparent 70%);
    top: -120px; left: -140px;
    opacity: 0.42;
    animation: float-slow 18s ease-in-out infinite;
  }
  .blob-2 {
    width: 460px; height: 460px;
    background: radial-gradient(circle, #818CF8 0%, transparent 70%);
    bottom: -100px; right: -90px;
    opacity: 0.48;
    animation: float-slow 22s ease-in-out infinite reverse;
  }
  .blob-3 {
    width: 320px; height: 320px;
    background: radial-gradient(circle, #EC4899 0%, transparent 70%);
    top: 12%; right: 20%;
    opacity: 0.22;
    animation: float-center 26s ease-in-out infinite;
  }
  .blob-4 {
    width: 380px; height: 380px;
    background: radial-gradient(circle, #1E3A8A 0%, transparent 70%);
    bottom: 14%; left: 10%;
    opacity: 0.18;
    animation: float-slow 30s ease-in-out infinite;
  }
  .blob-5 {
    width: 220px; height: 220px;
    background: radial-gradient(circle, #4F46E5 0%, transparent 70%);
    top: 60%; left: 35%;
    opacity: 0.30;
    animation: float-center 24s ease-in-out infinite reverse;
  }

  @keyframes float-slow {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-30px, 40px) scale(1.05); }
  }
  @keyframes float-center {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%      { transform: translate(40px, -30px) scale(.95); }
    66%      { transform: translate(-20px, 50px) scale(1.05); }
  }

  /* 浮动几何元素 */
  .float-shape {
    position: fixed;
    z-index: 0;
    pointer-events: none;
  }
  .shape-ring {
    width: 110px; height: 110px;
    border: 2.5px solid rgba(99,91,255,.42);
    border-radius: 50%;
    top: 12%; right: 7%;
    animation: spin-slow 30s linear infinite;
    opacity: 0.85;
  }
  .shape-ring::before {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    top: -5px; left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 16px rgba(99,91,255,.7);
  }
  .shape-ring-2 {
    width: 60px; height: 60px;
    border: 2px dashed rgba(236,72,153,.4);
    border-radius: 50%;
    bottom: 28%; right: 22%;
    animation: spin-slow 18s linear infinite reverse;
    opacity: 0.7;
  }
  .shape-square {
    width: 48px; height: 48px;
    border: 2px solid rgba(236,72,153,.45);
    border-radius: 10px;
    bottom: 20%; left: 7%;
    transform: rotate(15deg);
    animation: tilt 8s ease-in-out infinite;
    opacity: 0.85;
  }
  .shape-square-fill {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
    border-radius: 7px;
    top: 70%; right: 6%;
    transform: rotate(-12deg);
    animation: tilt 10s ease-in-out infinite reverse;
    box-shadow: 0 8px 24px rgba(99,91,255,.4);
    opacity: 0.85;
  }
  .shape-dot-cluster {
    top: 22%; left: 5%;
    width: 96px; height: 96px;
    background-image: radial-gradient(circle, var(--accent) 2px, transparent 2px);
    background-size: 14px 14px;
    opacity: 0.55;
  }
  .shape-dot-cluster-2 {
    bottom: 12%; right: 32%;
    width: 80px; height: 80px;
    background-image: radial-gradient(circle, var(--pink) 1.8px, transparent 1.8px);
    background-size: 12px 12px;
    opacity: 0.4;
  }
  .shape-cross {
    bottom: 11%; right: 15%;
    width: 32px; height: 32px;
    color: var(--accent);
    opacity: 0.7;
  }
  .shape-cross::before,
  .shape-cross::after {
    content: '';
    position: absolute;
    background: currentColor;
    border-radius: 1.5px;
  }
  .shape-cross::before { left: 14px; top: 0; width: 3px; height: 32px; }
  .shape-cross::after  { left: 0; top: 14px; width: 32px; height: 3px; }

  .shape-cross-2 {
    top: 55%; left: 12%;
    width: 18px; height: 18px;
    color: var(--pink);
    opacity: 0.6;
  }
  .shape-cross-2::before,
  .shape-cross-2::after {
    content: '';
    position: absolute;
    background: currentColor;
    border-radius: 1px;
  }
  .shape-cross-2::before { left: 8px; top: 0; width: 2px; height: 18px; }
  .shape-cross-2::after  { left: 0; top: 8px; width: 18px; height: 2px; }

  /* 浮动卡片影（小型迷你 UI 卡） */
  .mini-card {
    position: fixed;
    z-index: 0;
    pointer-events: none;
    background: rgba(255,255,255,.7);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(99,91,255,.12);
    border-radius: 10px;
    padding: 10px 14px;
    box-shadow: 0 8px 24px rgba(99,91,255,.12);
    font-size: 12px;
    color: var(--fg-3);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mini-card .mc-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .mini-card-1 {
    top: 18%; left: 6%;
    transform: rotate(-6deg);
    animation: tilt 12s ease-in-out infinite;
  }
  .mini-card-2 {
    bottom: 18%; right: 6%;
    transform: rotate(5deg);
    animation: tilt 14s ease-in-out infinite reverse;
  }

  @keyframes spin-slow {
    from { transform: rotate(0); }
    to   { transform: rotate(360deg); }
  }
  @keyframes tilt {
    0%, 100% { transform: rotate(15deg) translateY(0); }
    50%      { transform: rotate(-8deg) translateY(-12px); }
  }

  /* SVG noise 纹理 */
  .bg-noise {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.5;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
  }

  /* ============ 主容器 ============ */
  .auth {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  /* ============ 卡片 ============ */
  .card {
    width: 100%;
    max-width: 440px;
    background: var(--bg);
    border: 1px solid var(--border-soft);
    border-radius: var(--r-2xl);
    box-shadow: var(--shadow-3);
    position: relative;
    overflow: hidden;
  }

  /* 顶部高光条 */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--pink) 100%);
  }

  /* 卡内右上小装饰 */
  .card-deco {
    position: absolute;
    top: -40px; right: -40px;
    width: 140px; height: 140px;
    background: radial-gradient(circle, var(--accent-bg-2) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .card-inner {
    padding: 44px 40px 36px;
    position: relative;
  }

  /* 品牌区 */
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .brand-logo {
    width: 44px; height: 44px;
    border-radius: 11px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 18px;
    letter-spacing: -.03em;
    box-shadow: 0 6px 16px rgba(99,91,255,.35);
  }
  .brand-text { display: flex; flex-direction: column; }
  .brand-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--fg);
    letter-spacing: -.01em;
    line-height: 1.2;
  }
  .brand-sub {
    font-size: 11.5px;
    color: var(--fg-4);
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .brand-pill {
    margin-left: auto;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--accent-bg);
    color: var(--accent-fg);
    letter-spacing: .06em;
  }

  /* 标题 */
  .form-title {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -.022em;
    margin: 0 0 8px;
    color: var(--fg);
  }
  .form-sub {
    font-size: 13.5px;
    color: var(--fg-3);
    margin-bottom: 30px;
  }

  /* 表单 */
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 18px;
  }
  .form-label {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--fg-2);
  }
  .form-input-wrap {
    position: relative;
  }
  .form-input {
    width: 100%;
    height: 44px;
    padding: 0 14px 0 42px;
    font-size: 14px;
    color: var(--fg);
    background: var(--bg);
    border: 1px solid var(--border-soft);
    border-radius: var(--r-md);
    outline: none;
    transition: border-color .15s, box-shadow .15s, background .15s;
  }
  .form-input::placeholder { color: var(--fg-4); }
  .form-input:hover { border-color: var(--border-strong); }
  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }
  .form-input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--fg-4);
    transition: color .15s;
    pointer-events: none;
  }
  .form-input:focus ~ .form-input-icon,
  .form-input-wrap:focus-within .form-input-icon { color: var(--accent); }
  .form-input-icon svg { width: 16px; height: 16px; display: block; }

  .form-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    font-size: 13px;
  }
  .form-check {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    color: var(--fg-3);
    user-select: none;
  }
  .form-check input { margin: 0; accent-color: var(--accent); }
  .form-link { color: var(--accent-fg); font-weight: 500; }
  .form-link:hover { text-decoration: underline; }

  /* 主按钮 */
  .btn-submit {
    width: 100%;
    height: 46px;
    border: none;
    border-radius: var(--r-md);
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
    color: #fff;
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: .04em;
    transition: box-shadow .2s, transform .15s;
    box-shadow: 0 4px 12px rgba(99,91,255,.32);
    position: relative;
    overflow: hidden;
  }
  .btn-submit::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,.25) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform .6s;
  }
  .btn-submit:hover {
    box-shadow: 0 6px 20px rgba(99,91,255,.45);
  }
  .btn-submit:hover::before { transform: translateX(100%); }
  .btn-submit:active { transform: scale(.99); }

  /* 底部 */
  .form-foot {
    margin-top: 22px;
    text-align: center;
    font-size: 13px;
    color: var(--fg-3);
  }
  .form-foot a {
    color: var(--accent-fg);
    font-weight: 500;
  }
  .form-foot a:hover { text-decoration: underline; }

  /* 卡片底部状态条 */
  .system-bar {
    margin-top: 28px;
    padding: 14px 20px;
    background: var(--bg-soft);
    border-top: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11.5px;
    color: var(--fg-4);
  }
  .system-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 0 3px rgba(0,163,111,.18);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(0,163,111,.18); }
    50% { box-shadow: 0 0 0 5px rgba(0,163,111,.05); }
  }

  /* footer 文字 */
  .auth-foot {
    position: fixed;
    bottom: 18px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11.5px;
    color: var(--fg-4);
    z-index: 1;
    pointer-events: none;
  }
  .auth-foot a { pointer-events: auto; color: var(--fg-3); }
  .auth-foot a:hover { color: var(--accent-fg); }

  /* 响应式 */
  @media (max-width: 540px) {
    .card-inner { padding: 32px 24px 24px; }
    .form-title { font-size: 22px; }
    .auth-foot { display: none; }
  }
</style>
</head>
<body>

<div class="bg-watermark">JOBS</div>
<div class="bg-watermark-2">SALARY</div>
<div class="bg-streak streak-1"></div>
<div class="bg-streak streak-2"></div>
<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>
<div class="bg-blob blob-3"></div>
<div class="bg-blob blob-4"></div>
<div class="bg-blob blob-5"></div>
<div class="float-shape shape-ring"></div>
<div class="float-shape shape-ring-2"></div>
<div class="float-shape shape-square"></div>
<div class="float-shape shape-square-fill"></div>
<div class="float-shape shape-dot-cluster"></div>
<div class="float-shape shape-dot-cluster-2"></div>
<div class="float-shape shape-cross"></div>
<div class="float-shape shape-cross-2"></div>

<div class="mini-card mini-card-1">
  <span class="mc-dot" style="background: #00A36F;"></span>
  <span>本月完结 +12 项</span>
</div>
<div class="mini-card mini-card-2">
  <span class="mc-dot" style="background: var(--accent);"></span>
  <span>实得佣金 ¥4,320</span>
</div>

<div class="bg-noise"></div>

<div class="auth">

  <div class="card">
    <div class="card-deco"></div>
    <div class="card-inner">

      <div class="brand">
        <div class="brand-logo">J</div>
        <div class="brand-text">
          <div class="brand-name">抢单平台</div>
          <div class="brand-sub">薪资计算系统</div>
        </div>
        <span class="brand-pill">PRO</span>
      </div>

      <h2 class="form-title">欢迎回来</h2>
      <p class="form-sub">使用工作账号登录，继续您的抢单旅程</p>

      <form onsubmit="event.preventDefault(); alert('演示页 · 不会真的提交');">
        <div class="form-group">
          <label class="form-label">手机号 / 用户名</label>
          <div class="form-input-wrap">
            <input type="text" class="form-input" placeholder="输入手机号或用户名">
            <span class="form-input-icon">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
                <circle cx="8" cy="6" r="3"/>
                <path d="M3 14a5 5 0 0 1 10 0"/>
              </svg>
            </span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="form-input-wrap">
            <input type="password" class="form-input" placeholder="输入登录密码">
            <span class="form-input-icon">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
                <rect x="3" y="7" width="10" height="7" rx="1.5"/>
                <path d="M5 7V5a3 3 0 0 1 6 0v2"/>
              </svg>
            </span>
          </div>
        </div>

        <div class="form-row">
          <label class="form-check">
            <input type="checkbox" checked>
            <span>记住登录状态</span>
          </label>
          <a href="#" class="form-link">忘记密码？</a>
        </div>

        <button type="submit" class="btn-submit">立即登录</button>

        <div class="form-foot">
          还没账号？请联系管理员开通 · <a href="#">查看指引</a>
        </div>
      </form>
    </div>

    <div class="system-bar">
      <div class="system-status">
        <span class="status-dot"></span>
        <span>系统运行正常</span>
      </div>
      <span>v 2.4.1</span>
    </div>
  </div>

</div>

<div class="auth-foot">
  © 2026 抢单平台 · <a href="#">服务协议</a> · <a href="#">隐私政策</a>
</div>

</body>
</html>
