<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>抢单平台 · 登录 · Glass 毛玻璃方案</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --fg:           #1A1F36;
    --fg-2:         #3C4257;
    --fg-3:         #54575F;
    --fg-4:         #8C8F96;

    --accent:       #635BFF;
    --accent-hover: #5851EE;
    --accent-deep:  #4842D2;
    --accent-bg:    #F1F0FE;
    --accent-fg:    #4F46E5;

    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI',
                 'PingFang SC', 'Microsoft YaHei', sans-serif;

    --r-md: 8px;
    --r-lg: 12px;
    --r-xl: 20px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: var(--font-sans);
    font-size: 14px;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'cv02','cv03','cv11','ss01';
    height: 100vh;
    position: relative;

    background:
      radial-gradient(at 20% 20%, #7C75FF 0%, transparent 45%),
      radial-gradient(at 80% 30%, #4F46E5 0%, transparent 50%),
      radial-gradient(at 60% 80%, #EC4899 0%, transparent 55%),
      radial-gradient(at 30% 90%, #1E3A8A 0%, transparent 50%),
      linear-gradient(135deg, #4842D2 0%, #2E2A8A 100%);
    background-attachment: fixed;
  }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }
  a { color: inherit; text-decoration: none; }

  /* 漂浮装饰 blob */
  .float-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
  }
  .fb-1 {
    width: 320px; height: 320px;
    background: rgba(255,255,255,.15);
    top: 10%; left: 8%;
    animation: drift 20s ease-in-out infinite;
  }
  .fb-2 {
    width: 240px; height: 240px;
    background: rgba(236,72,153,.35);
    bottom: 15%; left: 30%;
    animation: drift 28s ease-in-out infinite reverse;
  }
  .fb-3 {
    width: 380px; height: 380px;
    background: rgba(124,117,255,.28);
    bottom: -100px; right: 5%;
    animation: drift 24s ease-in-out infinite;
  }
  @keyframes drift {
    0%, 100% { transform: translate(0,0); }
    50% { transform: translate(60px, -40px); }
  }

  /* 网格点底纹（叠在渐变上） */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,.08) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }

  /* ============ 主布局 ============ */
  .auth {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 40px;
    padding: 56px 64px;
    align-items: center;
  }

  /* ============ 左 · 品牌 hero ============ */
  .hero-side {
    color: #fff;
    max-width: 560px;
  }
  .hero-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 56px;
  }
  .hero-logo {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: rgba(255,255,255,.18);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.25);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 15px;
    letter-spacing: -.02em;
  }
  .hero-name {
    font-weight: 600; font-size: 16.5px;
  }
  .hero-pill {
    font-size: 10.5px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(255,255,255,.18);
    border: 1px solid rgba(255,255,255,.25);
    letter-spacing: .06em;
  }

  .hero-headline {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -.03em;
    line-height: 1.05;
    margin: 0 0 24px;
  }
  .hero-headline .gradient-text {
    background: linear-gradient(90deg, #fff 0%, rgba(255,255,255,.55) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero-desc {
    font-size: 16px;
    line-height: 1.6;
    opacity: 0.85;
    max-width: 460px;
    margin: 0 0 48px;
  }

  /* 数据条 */
  .hero-stats {
    display: flex;
    gap: 40px;
    margin-bottom: 48px;
  }
  .stat-item .num {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -.02em;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .stat-item .label {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 6px;
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  /* sparkline 装饰 */
  .hero-spark {
    width: 360px;
    opacity: 0.7;
  }
  .hero-spark svg { width: 100%; height: 56px; display: block; }

  /* ============ 右 · 玻璃卡 ============ */
  .glass-card {
    background: rgba(255,255,255,.10);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid rgba(255,255,255,.18);
    border-radius: var(--r-xl);
    padding: 40px 36px 32px;
    box-shadow:
      0 24px 60px rgba(0,0,0,.28),
      inset 0 1px 0 rgba(255,255,255,.18);
    color: #fff;
    max-width: 420px;
    width: 100%;
    justify-self: end;
  }

  .glass-title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -.018em;
    margin: 0 0 6px;
  }
  .glass-sub {
    font-size: 13.5px;
    opacity: 0.7;
    margin-bottom: 28px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 18px;
  }
  .form-label {
    font-size: 12px;
    font-weight: 500;
    opacity: 0.85;
    letter-spacing: .02em;
  }
  .form-input-wrap { position: relative; }
  .form-input {
    width: 100%;
    height: 44px;
    padding: 0 14px 0 42px;
    font-size: 14px;
    color: #fff;
    background: rgba(255,255,255,.10);
    border: 1px solid rgba(255,255,255,.20);
    border-radius: var(--r-md);
    outline: none;
    transition: border-color .15s, background .15s, box-shadow .15s;
  }
  .form-input::placeholder { color: rgba(255,255,255,.5); }
  .form-input:hover {
    background: rgba(255,255,255,.14);
    border-color: rgba(255,255,255,.28);
  }
  .form-input:focus {
    border-color: rgba(255,255,255,.55);
    background: rgba(255,255,255,.18);
    box-shadow: 0 0 0 3px rgba(255,255,255,.12);
  }
  .form-input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,.6);
    pointer-events: none;
  }
  .form-input-icon svg { width: 16px; height: 16px; display: block; }

  .form-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
    font-size: 13px;
    opacity: 0.9;
  }
  .form-check {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
  }
  .form-check input {
    margin: 0;
    accent-color: #fff;
  }
  .form-link { font-weight: 500; opacity: 0.85; }
  .form-link:hover { opacity: 1; text-decoration: underline; }

  .btn-submit {
    width: 100%;
    height: 46px;
    border: none;
    border-radius: var(--r-md);
    background: #fff;
    color: var(--accent-deep);
    font-size: 14.5px;
    font-weight: 700;
    letter-spacing: .04em;
    transition: transform .15s, box-shadow .2s;
    box-shadow: 0 8px 24px rgba(0,0,0,.18);
  }
  .btn-submit:hover {
    box-shadow: 0 12px 32px rgba(0,0,0,.28);
    transform: translateY(-1px);
  }
  .btn-submit:active { transform: translateY(0); }

  .glass-foot {
    margin-top: 20px;
    text-align: center;
    font-size: 12.5px;
    opacity: 0.7;
  }
  .glass-foot a { font-weight: 500; opacity: 0.95; }
  .glass-foot a:hover { text-decoration: underline; }

  /* 整体底部 */
  .auth-foot {
    position: fixed;
    bottom: 18px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11.5px;
    opacity: 0.55;
    z-index: 1;
    pointer-events: none;
  }
  .auth-foot a { pointer-events: auto; }
  .auth-foot a:hover { opacity: 1; text-decoration: underline; }

  /* 响应式 */
  @media (max-width: 980px) {
    .auth {
      grid-template-columns: 1fr;
      padding: 32px 24px;
      align-items: center;
      justify-items: center;
      overflow-y: auto;
    }
    .hero-side { text-align: center; max-width: 100%; }
    .hero-top { justify-content: center; margin-bottom: 28px; }
    .hero-headline { font-size: 38px; }
    .hero-desc { margin: 0 auto 24px; }
    .hero-stats { justify-content: center; gap: 28px; }
    .hero-spark { display: none; }
    .glass-card { justify-self: center; }
    html, body { overflow: auto; }
  }
  @media (max-width: 540px) {
    .hero-headline { font-size: 30px; }
    .hero-stats { display: none; }
    .glass-card { padding: 28px 22px 22px; }
  }
</style>
</head>
<body>

<div class="float-blob fb-1"></div>
<div class="float-blob fb-2"></div>
<div class="float-blob fb-3"></div>

<div class="auth">

  <!-- ============ 左 · hero ============ -->
  <section class="hero-side">
    <div class="hero-top">
      <div class="hero-logo">J</div>
      <div class="hero-name">抢单平台</div>
      <div class="hero-pill">PRO</div>
    </div>

    <h1 class="hero-headline">
      抢单更高效<br>
      <span class="gradient-text">薪资全自动</span>
    </h1>

    <p class="hero-desc">
      从任务大厅到佣金到账，全链路自动化。两套规则智能切换，逾期自动识别，让每笔薪资都看得见、算得清。
    </p>

    <div class="hero-stats">
      <div class="stat-item">
        <div class="num">2,860+</div>
        <div class="label">完结项目</div>
      </div>
      <div class="stat-item">
        <div class="num">¥84M+</div>
        <div class="label">累计佣金</div>
      </div>
      <div class="stat-item">
        <div class="num">98<span style="font-size:18px;opacity:.7;">%</span></div>
        <div class="label">准时完结</div>
      </div>
    </div>

    <div class="hero-spark">
      <svg viewBox="0 0 360 56" preserveAspectRatio="none">
        <defs>
          <linearGradient id="hs-fill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="M 0,40 L 60,32 L 120,36 L 180,18 L 240,24 L 300,12 L 360,16 L 360,56 L 0,56 Z" fill="url(#hs-fill)"/>
        <path d="M 0,40 L 60,32 L 120,36 L 180,18 L 240,24 L 300,12 L 360,16"
              fill="none" stroke="#fff" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="0"   cy="40" r="2.5" fill="#fff" opacity="0.7"/>
        <circle cx="60"  cy="32" r="2.5" fill="#fff" opacity="0.7"/>
        <circle cx="120" cy="36" r="2.5" fill="#fff" opacity="0.7"/>
        <circle cx="180" cy="18" r="2.5" fill="#fff" opacity="0.7"/>
        <circle cx="240" cy="24" r="2.5" fill="#fff" opacity="0.7"/>
        <circle cx="300" cy="12" r="2.5" fill="#fff" opacity="0.7"/>
        <circle cx="360" cy="16" r="3.5" fill="#fff"/>
      </svg>
    </div>
  </section>

  <!-- ============ 右 · 玻璃卡 ============ -->
  <main class="glass-card">
    <h2 class="glass-title">登录账户</h2>
    <p class="glass-sub">使用工作账号继续</p>

    <form onsubmit="event.preventDefault(); alert('演示页 · 不会真的提交');">
      <div class="form-group">
        <label class="form-label">手机号 / 用户名</label>
        <div class="form-input-wrap">
          <input type="text" class="form-input" placeholder="输入账号">
          <span class="form-input-icon">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <circle cx="8" cy="6" r="3"/>
              <path d="M3 14a5 5 0 0 1 10 0"/>
            </svg>
          </span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">密码</label>
        <div class="form-input-wrap">
          <input type="password" class="form-input" placeholder="输入密码">
          <span class="form-input-icon">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
              <rect x="3" y="7" width="10" height="7" rx="1.5"/>
              <path d="M5 7V5a3 3 0 0 1 6 0v2"/>
            </svg>
          </span>
        </div>
      </div>

      <div class="form-row">
        <label class="form-check">
          <input type="checkbox" checked>
          <span>记住登录</span>
        </label>
        <a href="#" class="form-link">忘记密码？</a>
      </div>

      <button type="submit" class="btn-submit">立 即 登 录</button>

      <div class="glass-foot">
        还没账号？ <a href="#">联系管理员开通</a>
      </div>
    </form>
  </main>

</div>

<div class="auth-foot">
  © 2026 抢单平台 · <a href="#">服务协议</a> · <a href="#">隐私政策</a>
</div>

</body>
</html>
